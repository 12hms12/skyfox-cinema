basePath: /
definitions:
  controller.forgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  controller.resetPasswordRequest:
    properties:
      password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - password
    - token
    type: object
  error.AppError:
    properties:
      code:
        type: string
      error: {}
      message:
        type: string
    type: object
  model.AvatarType:
    enum:
    - predefined
    - uploaded
    type: string
    x-enum-varnames:
    - PREDEFINED
    - UPLOADED
  model.Customer:
    properties:
      age:
        type: integer
      avatarType:
        $ref: '#/definitions/model.AvatarType'
      avatarURL:
        type: string
      countryCode:
        type: string
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      gender:
        $ref: '#/definitions/model.Gender'
      id:
        type: integer
      isEmailVerified:
        type: boolean
      isPhoneVerified:
        type: boolean
      lastName:
        type: string
      password:
        type: string
      passwordResetToken:
        type: string
      passwordTokenExpiryTime:
        type: string
      phoneNumber:
        type: string
      updatedAt:
        type: string
      userRole:
        type: string
      username:
        type: string
    type: object
  model.Gender:
    enum:
    - male
    - female
    - prefer_not_to
    type: string
    x-enum-varnames:
    - MALE
    - FEMALE
    - PREFER_NOT_TO_SAY
  model.Movie:
    properties:
      duration:
        type: string
      genre:
        type: string
      id:
        type: string
      imdbRating:
        type: string
      imdbVotes:
        type: string
      name:
        type: string
      plot:
        type: string
      poster:
        type: string
      rated:
        type: string
    type: object
  model.Slot:
    properties:
      endTime:
        type: string
      id:
        type: integer
      name:
        type: string
      startTime:
        type: string
    type: object
  request.AddScreenRequest:
    properties:
      name:
        type: string
    type: object
  request.CaptchaVerifyRequest:
    properties:
      captcha_id:
        type: string
      slider_position_x:
        type: number
    required:
    - captcha_id
    - slider_position_x
    type: object
  request.CustomerLoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - password
    type: object
  request.CustomerSignupRequest:
    properties:
      age:
        minimum: 1
        type: integer
      captcha_id:
        type: string
      countryCode:
        type: string
      email:
        type: string
      firstName:
        maxLength: 100
        minLength: 2
        type: string
      gender:
        $ref: '#/definitions/model.Gender'
      lastName:
        maxLength: 100
        minLength: 2
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
      phoneNumber:
        type: string
      slider_position_x:
        type: number
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - age
    - captcha_id
    - countryCode
    - email
    - firstName
    - gender
    - lastName
    - password
    - phoneNumber
    - slider_position_x
    - username
    type: object
  request.CustomerUpdateProfileRequest:
    properties:
      age:
        minimum: 1
        type: integer
      email:
        type: string
      first_name:
        maxLength: 20
        minLength: 2
        type: string
      last_name:
        maxLength: 20
        minLength: 2
        type: string
    type: object
  request.OTPResendRequest:
    properties:
      recipient:
        type: string
    required:
    - recipient
    type: object
  request.OTPSendRequest:
    properties:
      recipient:
        type: string
    required:
    - recipient
    type: object
  request.OTPVerifyRequest:
    properties:
      code:
        type: string
      recipient:
        type: string
    required:
    - code
    - recipient
    type: object
  request.ScheduleShowRequest:
    properties:
      cost:
        type: number
      date:
        type: string
      movieId:
        type: string
      rated:
        type: string
      screenId:
        type: integer
      slotId:
        type: integer
    required:
    - cost
    - date
    - movieId
    - screenId
    - slotId
    type: object
  request.UpdateAvatarRequest:
    properties:
      avatar_type:
        type: string
      avatar_url:
        type: string
      predefined_avatar_id:
        type: integer
    type: object
  response.AdminBookingViewItem:
    properties:
      id:
        type: integer
      movieName:
        type: string
      onlineCustomerId:
        type: integer
      showDate:
        type: string
      showId:
        type: integer
      startTime:
        type: string
      status:
        type: string
      totalPrice:
        type: number
      transactionId:
        type: string
    type: object
  response.AdminBookingViewResponse:
    properties:
      bookings:
        items:
          $ref: '#/definitions/response.AdminBookingViewItem'
        type: array
      total:
        type: integer
    type: object
  response.AvatarResponse:
    properties:
      avatar_type:
        type: string
      avatar_url:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  response.CaptchaGenerateResponse:
    properties:
      captcha_id:
        type: string
      master_image:
        type: string
      tile_height:
        type: integer
      tile_image:
        type: string
      tile_width:
        type: integer
      tile_x:
        type: integer
      tile_y:
        type: integer
    type: object
  response.LoginResponse:
    properties:
      age:
        type: integer
      avatar_type:
        $ref: '#/definitions/model.AvatarType'
      avatar_url:
        type: string
      gender:
        $ref: '#/definitions/model.Gender'
      id:
        type: string
      role:
        type: string
      token:
        type: string
      username:
        type: string
    type: object
  response.MovieResponse:
    properties:
      Actors:
        type: string
      Awards:
        type: string
      Country:
        type: string
      Director:
        type: string
      Genre:
        type: string
      Language:
        type: string
      Plot:
        type: string
      Poster:
        type: string
      Rated:
        type: string
      Released:
        type: string
      Runtime:
        type: string
      Title:
        type: string
      Writer:
        type: string
      Year:
        type: string
      imdbID:
        type: string
    type: object
  response.OTPItem:
    properties:
      attempts:
        type: integer
      code:
        type: string
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      is_used:
        type: boolean
      purpose:
        type: string
      recipient:
        type: string
      type:
        type: string
    type: object
  response.OTPListResponse:
    properties:
      otps:
        items:
          $ref: '#/definitions/response.OTPItem'
        type: array
    type: object
  response.OTPSendResponse:
    properties:
      expires_in_seconds:
        type: integer
      message:
        type: string
      success:
        type: boolean
    type: object
  response.OTPVerifyResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
      verified:
        type: boolean
    type: object
  response.PredefinedAvatarListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/response.PredefinedAvatarResponse'
        type: array
      total:
        type: integer
    type: object
  response.PredefinedAvatarResponse:
    properties:
      gender:
        type: string
      id:
        type: integer
      url:
        type: string
    type: object
  response.RevenueResponse:
    properties:
      grossRevenue:
        type: number
      shows:
        items:
          $ref: '#/definitions/response.RevenueShow'
        type: array
    type: object
  response.RevenueShow:
    properties:
      date:
        type: string
      id:
        type: integer
      movie:
        $ref: '#/definitions/model.Movie'
      revenue:
        type: number
      showTime:
        type: string
      ticketSold:
        type: integer
    type: object
  response.ScheduleItem:
    properties:
      cost:
        type: number
      date:
        type: string
      id:
        type: integer
      movie:
        $ref: '#/definitions/response.ScheduledMovieBrief'
      screenId:
        type: integer
      slotId:
        type: integer
    type: object
  response.ScheduleShowResponse:
    properties:
      cost:
        type: number
      date:
        type: string
      id:
        type: integer
      movieId:
        type: string
      rated:
        type: string
      screenId:
        type: integer
      slotId:
        type: integer
    type: object
  response.ScheduledMovieBrief:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  response.ScreenOption:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  response.SeatResponse:
    properties:
      basePrice:
        description: includes weekend surcharge if applicable
        type: number
      column:
        description: e.g. 1
        type: integer
      isWeekend:
        type: boolean
      label:
        description: e.g. "A1", "B10"
        type: string
      row:
        description: e.g. "A"
        type: string
      seatId:
        type: integer
      seatType:
        description: '"REGULAR", "PREMIUM"'
        type: string
      status:
        description: '"available" | "sold"'
        type: string
    type: object
  response.SeatStatusResponse:
    properties:
      seats:
        items:
          $ref: '#/definitions/response.SeatResponse'
        type: array
      showDate:
        type: string
      showId:
        type: integer
    type: object
  response.ShowResponse:
    properties:
      cost:
        type: number
      date:
        type: string
      id:
        type: integer
      movie:
        $ref: '#/definitions/model.Movie'
      slot:
        $ref: '#/definitions/model.Slot'
    type: object
  response.ShowtimeResponse:
    properties:
      availableSeats:
        type: integer
      cost:
        type: number
      endTime:
        type: string
      screenId:
        type: integer
      screenName:
        type: string
      showId:
        type: integer
      slotId:
        type: integer
      slotName:
        type: string
      startTime:
        type: string
    type: object
  response.WeeklyScheduleResponse:
    properties:
      schedule:
        items:
          $ref: '#/definitions/response.ScheduleItem'
        type: array
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a skyfox
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Booking API
  version: "1.0"
paths:
  /admin/movies/{movieId}:
    get:
      consumes:
      - application/json
      description: get movie details by movie id
      parameters:
      - description: Enter basic auth
        in: header
        name: Authorization
        required: true
        type: string
      - description: movie id
        in: path
        name: movieId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Movie'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/error.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/error.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      security:
      - BasicAuth: []
      summary: Movie Details
      tags:
      - Movies
  /admin/schedule/week:
    get:
      consumes:
      - application/json
      description: get weekly schedule by start date
      parameters:
      - description: Enter basic auth
        in: header
        name: Authorization
        required: true
        type: string
      - description: week start date in YYYY-MM-DD
        in: query
        name: startDate
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WeeklyScheduleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/error.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/error.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      security:
      - BasicAuth: []
      summary: Weekly Admin Schedule
      tags:
      - Admin-Schedule
  /admin/screens:
    get:
      consumes:
      - application/json
      description: get all screens
      parameters:
      - description: Enter basic auth
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/response.ScreenOption'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      security:
      - BasicAuth: []
      summary: Admin Screens
      tags:
      - Admin-Schedule
    post:
      consumes:
      - application/json
      description: create a new screen for scheduling
      parameters:
      - description: Enter basic auth
        in: header
        name: Authorization
        required: true
        type: string
      - description: Add screen request
        in: body
        name: request
        schema:
          $ref: '#/definitions/request.AddScreenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ScreenOption'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/error.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      security:
      - BasicAuth: []
      summary: Add Screen
      tags:
      - Admin-Schedule
  /admin/shows:
    post:
      consumes:
      - application/json
      description: schedule a movie to a screen and slot on a date
      parameters:
      - description: Enter basic auth
        in: header
        name: Authorization
        required: true
        type: string
      - description: Schedule show request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.ScheduleShowRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ScheduleShowResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/error.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/error.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      security:
      - BasicAuth: []
      summary: Schedule Show
      tags:
      - Admin-Schedule
  /admin/shows/{showId}:
    delete:
      consumes:
      - application/json
      description: delete a scheduled show by id
      parameters:
      - description: Enter basic auth
        in: header
        name: Authorization
        required: true
        type: string
      - description: Show ID
        in: path
        name: showId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/error.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/error.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      security:
      - BasicAuth: []
      summary: Delete Show
      tags:
      - Admin-Schedule
  /admin/slots:
    get:
      consumes:
      - application/json
      description: get all slots
      parameters:
      - description: Enter basic auth
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Slot'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      security:
      - BasicAuth: []
      summary: Admin Slots
      tags:
      - Admin-Schedule
  /admin/view-bookings:
    get:
      description: Get all bookings with optional filters for admin
      parameters:
      - description: Enter bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filter by start date (YYYY-MM-DD)
        in: query
        name: startDate
        type: string
      - description: Filter by end date (YYYY-MM-DD)
        in: query
        name: endDate
        type: string
      - description: Filter by movie name
        in: query
        name: movieName
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AdminBookingViewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/error.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/error.AppError'
      security:
      - BearerAuth: []
      summary: Get All Bookings
      tags:
      - Admin
  /api/captcha/generate:
    get:
      description: 'Returns a new slide captcha: background image, tile image and
        initial positions'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.CaptchaGenerateResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Generate slide captcha
      tags:
      - captcha
  /api/captcha/verify:
    post:
      consumes:
      - application/json
      description: Verifies the user's slider position against the stored target X
      parameters:
      - description: Captcha verify payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.CaptchaVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify slide captcha
      tags:
      - captcha
  /avatar:
    get:
      consumes:
      - application/json
      description: Retrieve the avatar of the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AvatarResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/error.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      security:
      - BearerAuth: []
      summary: Get my avatar
      tags:
      - Avatar
    put:
      consumes:
      - application/json
      description: Update the avatar for the authenticated user
      parameters:
      - description: Update Avatar Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.UpdateAvatarRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AvatarResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/error.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/error.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      security:
      - BearerAuth: []
      summary: Update my avatar
      tags:
      - Avatar
  /avatars/predefined:
    get:
      consumes:
      - application/json
      description: Get predefined avatars optionally filtered by gender
      parameters:
      - description: Gender filter
        in: query
        name: gender
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.PredefinedAvatarListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      summary: List predefined avatars
      tags:
      - Avatar
  /customer/profile:
    get:
      consumes:
      - application/json
      description: Returns the profile details of the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: Profile fetched successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Failed to fetch profile
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Invalid user ID or server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: View Profile
      tags:
      - OnlineCustomer
  /customer/signup:
    post:
      consumes:
      - application/json
      description: Register new online customer
      parameters:
      - description: Signup Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CustomerSignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Customer'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/error.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      summary: Customer Signup
      tags:
      - OnlineCustomer
  /forgot-password:
    post:
      consumes:
      - application/json
      description: Validates email and sends a password reset link to the user
      parameters:
      - description: Email of the user
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.forgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Email Found in DB
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request or Forgot password failed
          schema:
            additionalProperties: true
            type: object
      summary: Forgot Password
      tags:
      - Authentication
  /login:
    post:
      consumes:
      - application/json
      description: Authenticate online customer
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CustomerLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/error.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/error.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/error.AppError'
      summary: Customer Login
      tags:
      - OnlineCustomer
  /movies:
    get:
      consumes:
      - application/json
      description: get shows by date
      parameters:
      - description: Enter basic auth
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
